name: "Setup Build Environment"
description: "Installs dependencies required to build ITGmania based on the runner's operating system."
inputs:
  os:
    description: "The OS name from the matrix (e.g., ubuntu-24.04, macos-15, windows-2022)"
    required: true
  ccache:
    description: "Whether to install ccache"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libgl-dev libglu1-mesa-dev libgtk-3-dev libjack-dev libpulse-dev libudev-dev libxinerama-dev libx11-dev libxrandr-dev libxtst-dev nasm
        if [ "${{ inputs.ccache }}" = "true" ]; then
          sudo apt-get install -y ccache
        fi
      shell: bash

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install nasm
        if [ "${{ inputs.ccache }}" = "true" ]; then
          brew install ccache
        fi
      shell: bash

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      run: |
        if [ "${{ inputs.ccache }}" = "true" ]; then
          choco install ccache
        fi
      shell: bash

    - name: ccache
      if: inputs.ccache == 'true'
      uses: actions/cache@v5
      with:
        path: .ccache
        key: ${{ inputs.os }}-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.os }}-ccache-${{ github.ref }}-
          ${{ inputs.os }}-ccache-

    - name: Set ccache environment
      if: inputs.ccache == 'true'
      run: |
        mkdir -p .ccache
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $GITHUB_ENV
      shell: bash

    - name: Add msbuild to PATH
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: x64

    - name: Set CMake environment variables (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "CMAKE_BUILD_FLAGS=--parallel $(nproc)" >> $GITHUB_ENV
        echo "ARTIFACT_PATH=build/ITGmania-*.tar.gz" >> $GITHUB_ENV
      shell: bash

    - name: Set CMake environment variables (macOS M1)
      if: inputs.os == 'macos-15'
      run: |
        echo "CMAKE_FLAGS=-DCMAKE_OSX_ARCHITECTURES=arm64" >> $GITHUB_ENV
        echo "CMAKE_BUILD_FLAGS=--parallel $(sysctl -n hw.logicalcpu)" >> $GITHUB_ENV
        echo "ARTIFACT_PATH=build/ITGmania-*.dmg" >> $GITHUB_ENV
      shell: bash

    - name: Set CMake environment variables (macOS Intel)
      if: inputs.os == 'macos-15-intel'
      run: |
        echo "CMAKE_FLAGS=-DCMAKE_OSX_ARCHITECTURES=x86_64" >> $GITHUB_ENV
        echo "CMAKE_BUILD_FLAGS=--parallel $(sysctl -n hw.logicalcpu)" >> $GITHUB_ENV
        echo "ARTIFACT_PATH=build/ITGmania-*.dmg" >> $GITHUB_ENV
      shell: bash

    - name: Set CMake environment variables (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "CMAKE_BUILD_FLAGS=--parallel $env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV
        echo "ARTIFACT_PATH=build/ITGmania-*.exe" >> $env:GITHUB_ENV
      shell: pwsh
