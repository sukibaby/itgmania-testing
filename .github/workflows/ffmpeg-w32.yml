name: Build FFmpeg for Windows

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build-ffmpeg-windows.yml'
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 6 * *'
  workflow_dispatch:

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install MinGW-w64 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          mingw-w64 \
          mingw-w64-tools \
          gcc-mingw-w64-x86-64 \
          gcc-mingw-w64-i686 \
          g++-mingw-w64-x86-64 \
          g++-mingw-w64-i686 \
          nasm \
          yasm \
          pkg-config \
          make

    - name: Build FFmpeg x86_64 (64-bit)
      run: |
        cp -r extern/ffmpeg ffmpeg-src
        mkdir -p build/x64
        cd build/x64
        
        ../../ffmpeg-src/configure \
          --arch=x86_64 \
          --target-os=mingw32 \
          --cross-prefix=x86_64-w64-mingw32- \
          --disable-autodetect \
          --disable-avdevice \
          --disable-avfilter \
          --disable-debug \
          --disable-devices \
          --disable-doc \
          --disable-filters \
          --disable-lzma \
          --disable-network \
          --disable-postproc \
          --disable-programs \
          --disable-static \
          --disable-swresample \
          --enable-bzlib \
          --enable-d3d11va \
          --enable-dxva2 \
          --enable-gpl \
          --enable-shared \
          --enable-w32threads \
          --enable-zlib \
          --extra-cflags=-w \
          --extra-ldflags=-static \
          --prefix=/
        
        make -j$(nproc)

    - name: Package x86_64 binaries
      run: |
        mkdir -p package/x64
        cd build/x64
        
        # Remove duplicate DLLs (FFmpeg builds two sets)
        rm -f libavcodec/avcodec.dll libavformat/avformat.dll libavutil/avutil.dll libswscale/swscale.dll
        
        # Copy versioned DLLs, DEFs, and LIBs
        cp -v libavcodec/*.dll libavformat/*.dll libavutil/*.dll libswscale/*.dll ../../package/x64/ || true
        cp -v libavcodec/*.def libavformat/*.def libavutil/*.def libswscale/*.def ../../package/x64/ || true
        cp -v libavcodec/*.lib libavformat/*.lib libavutil/*.lib libswscale/*.lib ../../package/x64/ || true

    - name: Build FFmpeg x86 (32-bit)
      run: |
        mkdir -p build/x86
        cd build/x86
        
        ../../ffmpeg-src/configure \
          --arch=x86 \
          --target-os=mingw32 \
          --cross-prefix=i686-w64-mingw32- \
          --disable-autodetect \
          --disable-avdevice \
          --disable-avfilter \
          --disable-debug \
          --disable-devices \
          --disable-doc \
          --disable-filters \
          --disable-lzma \
          --disable-network \
          --disable-postproc \
          --disable-programs \
          --disable-static \
          --disable-swresample \
          --enable-bzlib \
          --enable-d3d11va \
          --enable-dxva2 \
          --enable-gpl \
          --enable-shared \
          --enable-w32threads \
          --enable-zlib \
          --extra-cflags=-w \
          --extra-ldflags=-static \
          --prefix=/
        
        make -j$(nproc)

    - name: Package x86 binaries
      run: |
        mkdir -p package/x86
        cd build/x86
        
        # Remove duplicate DLLs
        rm -f libavcodec/avcodec.dll libavformat/avformat.dll libavutil/avutil.dll libswscale/swscale.dll
        
        # Copy versioned DLLs, DEFs, and LIBs
        cp -v libavcodec/*.dll libavformat/*.dll libavutil/*.dll libswscale/*.dll ../../package/x86/ || true
        cp -v libavcodec/*.def libavformat/*.def libavutil/*.def libswscale/*.def ../../package/x86/ || true
        cp -v libavcodec/*.lib libavformat/*.lib libavutil/*.lib libswscale/*.lib ../../package/x86/ || true

    - name: Copy header files
      run: |
        mkdir -p package/include/libavcodec
        mkdir -p package/include/libavformat
        mkdir -p package/include/libavutil
        mkdir -p package/include/libswscale
        
        # Copy libavcodec headers
        cd build/x64
        for header in \
          ac3_parser.h adts_parser.h avcodec.h avdct.h avfft.h bsf.h \
          codec_desc.h codec.h codec_id.h codec_par.h d3d11va.h defs.h \
          dirac.h dv_profile.h dxva2.h jni.h mediacodec.h packet.h \
          qsv.h vdpau.h version.h version_major.h videotoolbox.h vorbis_parser.h xvmc.h; do
          if [ -f "libavcodec/$header" ]; then
            cp -v "libavcodec/$header" ../../package/include/libavcodec/
          fi
        done
        
        # Copy libavformat headers
        for header in avformat.h avio.h version.h version_major.h; do
          if [ -f "libavformat/$header" ]; then
            cp -v "libavformat/$header" ../../package/include/libavformat/
          fi
        done
        
        # Copy libavutil headers
        for header in \
          adler32.h aes_ctr.h aes.h attributes.h audio_fifo.h avassert.h \
          avconfig.h avstring.h avutil.h base64.h blowfish.h bprint.h \
          bswap.h buffer.h camellia.h cast5.h channel_layout.h common.h \
          cpu.h crc.h des.h detection_bbox.h dict.h display.h dovi_meta.h \
          downmix_info.h encryption_info.h error.h eval.h ffversion.h \
          fifo.h file.h film_grain_params.h frame.h hash.h hdr_dynamic_metadata.h \
          hmac.h hwcontext_cuda.h hwcontext_d3d11va.h hwcontext_drm.h \
          hwcontext_dxva2.h hwcontext.h hwcontext_mediacodec.h hwcontext_opencl.h \
          hwcontext_qsv.h hwcontext_vaapi.h hwcontext_vdpau.h hwcontext_videotoolbox.h \
          hwcontext_vulkan.h imgutils.h intfloat.h intreadwrite.h lfg.h \
          log.h lzo.h macros.h mastering_display_metadata.h mathematics.h \
          md5.h mem.h motion_vector.h murmur3.h opt.h parseutils.h \
          pixdesc.h pixelutils.h pixfmt.h random_seed.h rational.h \
          rc4.h replaygain.h ripemd.h samplefmt.h sha.h sha512.h \
          spherical.h stereo3d.h tea.h threadmessage.h time.h timecode.h \
          timestamp.h tree.h twofish.h tx.h version.h version_major.h \
          video_enc_params.h xtea.h; do
          if [ -f "libavutil/$header" ]; then
            cp -v "libavutil/$header" ../../package/include/libavutil/
          fi
        done
        
        # Copy libswscale headers
        for header in swscale.h version.h version_major.h; do
          if [ -f "libswscale/$header" ]; then
            cp -v "libswscale/$header" ../../package/include/libswscale/
          fi
        done

    - name: Create zip archive
      run: |
        cd package
        zip -r ../ffmpeg-w32-libraries.zip include/ x64/ x86/
        cd ..
        ls -lh ffmpeg-w32-libraries.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-w32-libraries
        path: ffmpeg-w32-libraries.zip
        retention-days: 30

    - name: Calculate SHA256 hash
      run: |
        echo "SHA256 hash of ffmpeg-w32-libraries.zip:"
        sha256sum ffmpeg-w32-libraries.zip
