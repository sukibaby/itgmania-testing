on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

name: Continuous integration

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-2022]
        include:
          - os: ubuntu-24.04
            name: Ubuntu (x86_64)
            system-deps: sudo apt-get update && sudo apt-get install -y nasm autoconf autoconf-archive automake libtool pkg-config
          - os: ubuntu-24.04-arm
            name: Ubuntu (ARM)
            system-deps: sudo apt-get update && sudo apt-get install -y nasm autoconf autoconf-archive automake libtool pkg-config
          - os: macos-15
            name: macOS (M1)
            system-deps: brew install nasm autoconf autoconf-archive automake libtool
          - os: macos-15-intel
            name: macOS (Intel)
            system-deps: brew install nasm autoconf autoconf-archive automake libtool
          - os: windows-2022
            name: Windows
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        if: matrix.os != 'windows-2022'
        run: ${{ matrix.system-deps }}

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git $HOME/vcpkg
            cd $HOME/vcpkg
            ./bootstrap-vcpkg.sh -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Add msbuild to PATH
        if: matrix.os == 'windows-2022'
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Determine job count
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            JOBS=$(sysctl -n hw.logicalcpu)
          elif command -v nproc >/dev/null 2>&1; then
            JOBS=$(nproc)
          elif [ -n "$NUMBER_OF_PROCESSORS" ]; then
            JOBS=$NUMBER_OF_PROCESSORS
          else
            JOBS=1
          fi
          echo "JOBS=$JOBS" >> $GITHUB_ENV

      - name: Configure
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake -B build \
              -DSM_USE_VCPKG=ON \
              -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
              -DVCPKG_TARGET_TRIPLET=x64-windows-static \
              -DWITH_FFMPEG_JOBS=${{ env.JOBS }}
          else
            cmake -B build \
              -DSM_USE_VCPKG=ON \
              -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
              -DWITH_FFMPEG_JOBS=${{ env.JOBS }}
          fi

      - name: Build
        shell: bash
        run: cmake --build build --parallel ${{ env.JOBS }}

  validate-xml-docs:
    name: Validate Lua.xml, LuaDocumentation.xml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate Lua.xml
        run: xmllint --noout Docs/Luadoc/Lua.xml
      - name: Validate LuaDocumentation.xml
        run: xmllint --noout Docs/Luadoc/LuaDocumentation.xml
